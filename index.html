<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IXLOS — Premium Medical Center</title>

  <link rel="icon" href="/favicon.ico">

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0b1220;color:#fff}
    a{text-decoration:none;color:inherit}

    .hero{
      position:relative;
      min-height:100vh;
      padding:40px;
      display:flex;
      align-items:center;
    }
    .hero::before{
      content:"";
      position:absolute;inset:0;
      background:
        linear-gradient(180deg,rgba(0,0,0,.25),rgba(0,0,0,.85)),
        url("team.jpg") center 30% / cover no-repeat;
      z-index:-1;
    }
    .box{
      max-width:640px;
      background:rgba(0,0,0,.55);
      backdrop-filter:blur(10px);
      border-radius:24px;
      padding:32px;
      box-shadow:0 30px 80px rgba(0,0,0,.5);
    }
    .box h1{font-size:42px;line-height:1.1;margin-bottom:12px}
    .box p{opacity:.85;margin-bottom:20px}
    .btn{
      display:inline-block;
      padding:14px 22px;
      border-radius:14px;
      background:linear-gradient(135deg,#ff2a2a,#c60000);
      color:#fff;
      font-weight:600;
      box-shadow:0 20px 40px rgba(255,0,0,.35);
      cursor:pointer;
    }

    /* Modal */
    .modal{
      position:fixed;inset:0;
      background:rgba(0,0,0,.75);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:999;
    }
    .modal.active{display:flex}
    .modal-box{
      width:min(92vw,720px);
      height:min(90vh,720px);
      background:#fff;
      border-radius:18px;
      overflow:hidden;
      position:relative;
    }
    .close{
      position:absolute;
      top:10px;right:12px;
      background:#000;
      color:#fff;
      border-radius:50%;
      width:32px;height:32px;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;
      z-index:2;
    }

    /* Call button */
    .call-btn{
      position:fixed;
      right:16px;
      bottom:90px;
      width:56px;height:56px;
      border-radius:50%;
      background:linear-gradient(135deg,#ff2a2a,#c60000);
      color:#fff;
      display:flex;align-items:center;justify-content:center;
      font-size:24px;
      box-shadow:0 20px 40px rgba(255,0,0,.45);
      z-index:998;
      animation:pulse 2s infinite;
    }
    @keyframes pulse{
      0%{box-shadow:0 0 0 0 rgba(255,31,31,.6)}
      70%{box-shadow:0 0 0 18px rgba(255,31,31,0)}
      100%{box-shadow:0 0 0 0 rgba(255,31,31,0)}
    }

    footer{
      padding:24px;
      text-align:center;
      opacity:.7;
      font-size:14px;
      background:#0b1220;
    }

    @media (max-width:700px){
      .hero{padding:20px}
      .hero::before{
        background:
          linear-gradient(180deg,rgba(0,0,0,.35),rgba(0,0,0,.9)),
          url("team.jpg") center 45% / cover no-repeat;
      }
      .box h1{font-size:30px}
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="box">
      <h1>Sog‘lig‘ingiz ishonchli qo‘llarda</h1>
      <p>Ваше здоровье — в надёжных руках</p>
      <p>IXLOS — Навоидаги премиум тиббий марказ.</p>
      <div class="btn" onclick="openForm()">Qabulga yozilish / Записаться</div>
    </div>
  </section>

  <!-- Modal with Tally -->
  <div class="modal" id="formModal">
    <div class="modal-box">
      <div class="close" onclick="closeForm()">×</div>
      <iframe
        data-tally-src="https://tally.so/r/EkxBLq"
        width="100%"
        height="100%"
        frameborder="0"
        marginheight="0"
        marginwidth="0"
        title="IXLOS — Qabulga yozilish">
      </iframe>
    </div>
  </div>

  <a href="tel:+998792000303" class="call-btn">📞</a>

  <footer>
    © IXLOS Medical Center<br>
    Powered by <a href="https://t.me/sherxon571" target="_blank" style="color:#ff6b6b">@sherxon571</a>
  </footer>

  <script async src="https://tally.so/widgets/embed.js"></script>
  <script>
    function openForm(){
      document.getElementById('formModal').classList.add('active');
    }
    function closeForm(){
      document.getElementById('formModal').classList.remove('active');
    }
  </script>

</body>
</html>
